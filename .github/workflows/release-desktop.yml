name: Release Desktop

# 推送 v* 标签时触发三平台并行构建并发布到 GitHub Releases
# 标签由 `bun run scripts/release.ts <version>` 创建

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── macOS (Apple Silicon) ─────────────────────────────
  # 未签名构建：用户首次安装需执行 `xattr -cr /Applications/ScienceX.app`
  # 无 Apple 开发者证书时的最佳方案：CSC_IDENTITY_AUTO_DISCOVERY=false + -c.mac.notarize=false
  # 未来获得证书后，在仓库 Secrets 配置 APPLE_ID/APPLE_APP_SPECIFIC_PASSWORD/APPLE_TEAM_ID
  # 并新增 CSC_LINK/CSC_KEY_PASSWORD，即可启用签名+公证
  macos-arm64:
    name: macOS (Apple Silicon)
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12
      - name: Install root dependencies
        run: bun install --frozen-lockfile
      - name: Install desktop dependencies
        run: |
          cd desktop
          bun install --frozen-lockfile
      - name: Build & publish
        run: ./desktop/scripts/build-macos-arm64.sh
        env:
          PUBLISH: always
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SKIP_PACKAGE_SMOKE: '1'
          SKIP_INSTALL: '1'

  # ── Windows x64 ───────────────────────────────────────
  # 未签名构建：首次运行会出现 SmartScreen 提示，点击「更多信息」→「仍要运行」
  windows-x64:
    name: Windows (x64)
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12
      - name: Install root dependencies
        run: bun install --frozen-lockfile
      - name: Install desktop dependencies
        run: |
          cd desktop
          bun install --frozen-lockfile
      - name: Build & publish
        run: ./desktop/scripts/build-windows-x64.ps1
        env:
          PUBLISH: always
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SKIP_PACKAGE_SMOKE: '1'
          SKIP_INSTALL: '1'

  # ── Linux x64 ─────────────────────────────────────────
  linux-x64:
    name: Linux (x64)
    runs-on: ubuntu-22.04
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12
      - name: Install root dependencies
        run: bun install --frozen-lockfile
      - name: Install desktop dependencies
        run: |
          cd desktop
          bun install --frozen-lockfile
      - name: Build & publish
        run: LINUX_ARCH=x64 ./desktop/scripts/build-linux.sh
        env:
          PUBLISH: always
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SKIP_PACKAGE_SMOKE: '1'
          SKIP_INSTALL: '1'
